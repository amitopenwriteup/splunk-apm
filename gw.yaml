---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: service-map-lab
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: service-map-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        instrumentation.opentelemetry.io/inject-python: "default/splunk-otel-collector"
    spec:
      containers:
      - name: api-gateway
        image: python:3.9-slim
        ports:
        - containerPort: 8080
        env:
        - name: ORDER_SERVICE_URL
          value: "http://order-service"
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service"
        command:
        - /bin/bash
        - -c
        - |
          pip install -q flask requests
          cat > /app.py << 'EOF'
          from flask import Flask, jsonify, request
          import requests
          import os

          app = Flask(__name__)

          ORDER_SERVICE = os.getenv('ORDER_SERVICE_URL', 'http://order-service')
          INVENTORY_SERVICE = os.getenv('INVENTORY_SERVICE_URL', 'http://inventory-service')

          @app.route('/health')
          def health():
              return jsonify({"status": "healthy"}), 200

          @app.route('/api/orders', methods=['POST'])
          def create_order():
              try:
                  response = requests.post(f'{ORDER_SERVICE}/orders', json=request.get_json(), timeout=5)
                  return jsonify(response.json()), response.status_code
              except Exception as e:
                  return jsonify({"error": str(e)}), 503

          @app.route('/api/orders')
          def list_orders():
              try:
                  response = requests.get(f'{ORDER_SERVICE}/orders', timeout=5)
                  return jsonify(response.json()), response.status_code
              except Exception as e:
                  return jsonify({"error": str(e)}), 503

          @app.route('/api/inventory/<int:product_id>')
          def check_inventory(product_id):
              try:
                  response = requests.get(f'{INVENTORY_SERVICE}/inventory/{product_id}', timeout=5)
                  return jsonify(response.json()), response.status_code
              except Exception as e:
                  return jsonify({"error": str(e)}), 503

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=8080)
          EOF
          python /app.py
